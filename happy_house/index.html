  <style>

  <script>
    (function () {
      var KEY_SETTINGS = "happy_house_settings_v1";
      var KEY_LEDGER = "happy_house_ledger_v4";
      var KEY_LEGACY = "happy_house_ledger_v3";
      var KEY_FB_ROOM = "happy_house_firestore_room_v1";
      var KEY_LOCAL_TS = "happy_house_local_ts";
      var ROOM_CODE = "sanghwi-minjeong-home2025";

      var firestoreDb = null;
      var fbListenerUnsub = null;
      var cloudPushTimer = null;
      var ignoreRemoteUntil = 0;

      function readFirebaseJsonCfg() {
        try {
          var el = document.getElementById("firebase-json");
          if (!el) return null;
          var o = JSON.parse(el.textContent);
          if (
            o &&
            typeof o.apiKey === "string" &&
            o.apiKey.length > 8 &&
            typeof o.projectId === "string" &&
            o.projectId.length > 0
          )
            return o;
        } catch (e) {}
        return null;
      }

      function sanitizeRoomKey(s) {
        return String(s || "").replace(/[^a-zA-Z0-9_-]/g, "").slice(0, 120);
      }

      function initFirestoreDb() {
        var cfg = readFirebaseJsonCfg();
        if (!cfg || typeof firebase === "undefined") return null;
        try {
          if (!firebase.apps.length) firebase.initializeApp(cfg);
          return firebase.firestore();
        } catch (e) {
          console.warn(e);
          return null;
        }
      }

      function detachFirestoreListener() {
        if (typeof fbListenerUnsub === "function") {
          fbListenerUnsub();
          fbListenerUnsub = null;
        }
      }

      function attachFirestoreListener() {
        detachFirestoreListener();
        firestoreDb = initFirestoreDb();
        var room = sanitizeRoomKey(localStorage.getItem(KEY_FB_ROOM));
        if (!firestoreDb || !room || room.length < 16) return false;

        fbListenerUnsub = firestoreDb
          .collection("happy_house_sync")
          .doc(room)
          .onSnapshot(function (snap) {
            if (Date.now() < ignoreRemoteUntil) return;
            var badge = document.getElementById("sync-badge");
            if (badge) badge.style.display = "none";
            if (!snap.exists) { scheduleCloudPush(); return; }
            var d = snap.data();
            if (!d || typeof d.settingsJson !== "string") return;
            try {
              var firestoreMs = d.updatedAt && d.updatedAt.toMillis ? d.updatedAt.toMillis() : 0;
              var localMs = parseInt(localStorage.getItem(KEY_LOCAL_TS) || "0", 10);
              if (localMs > firestoreMs) { scheduleCloudPush(); return; }
              var rs = JSON.parse(d.settingsJson);
              var rl = JSON.parse(d.ledgerJson || "[]");
              rl = rl.map(normalizeLedgerEntry).filter(Boolean);
              if (
                JSON.stringify(rs) === JSON.stringify(loadSettings()) &&
                JSON.stringify(rl) === JSON.stringify(loadLedger())
              )
                return;
              saveSettings(rs);
              saveLedger(rl);
              fillSettingsForm();
              render();
            } catch (e) {
              console.warn(e);
            }
          });
        return true;
      }

      function scheduleCloudPush() {
        var cfg = readFirebaseJsonCfg();
        var room = sanitizeRoomKey(localStorage.getItem(KEY_FB_ROOM));
        if (!cfg || !room || room.length < 16) return;

        var db = firestoreDb || initFirestoreDb();
        if (!db) return;
        firestoreDb = db;

        ignoreRemoteUntil = Date.now() + 2500;
        clearTimeout(cloudPushTimer);
        cloudPushTimer = setTimeout(function () {
          db.collection("happy_house_sync")
            .doc(room)
            .set({
              settingsJson: JSON.stringify(loadSettings()),
              ledgerJson: JSON.stringify(loadLedger()),
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            })
            .catch(function (e) {
              console.warn(e);
              updateFbStatus("클라우드 저장 실패: " + e.message, false);
            });
        }, 500);
      }

      function persistSettings(s) {
        saveSettings(s);
        localStorage.setItem(KEY_LOCAL_TS, String(Date.now()));
        scheduleCloudPush();
      }

      function persistLedger(a) {
        saveLedger(a);
        localStorage.setItem(KEY_LOCAL_TS, String(Date.now()));
        scheduleCloudPush();
      }

      function updateFbStatus(text, ok) {
        var el = document.getElementById("fb-status");
        if (!el) return;
        el.textContent = text;
        el.className = "fb-status " + (ok ? "on" : "off");
      }

      function refreshFbUi() {
        var inp = document.getElementById("fb-room");
        var room = sanitizeRoomKey(localStorage.getItem(KEY_FB_ROOM));
        if (inp) inp.value = room || "";

        if (!readFirebaseJsonCfg()) {
          updateFbStatus(
            "Firebase 설정(apiKey·projectId 등)을 이 페이지 상단 firebase-json에 넣어 주세요.",
            false
          );
          return;
        }
        if (!room || room.length < 16) {
          updateFbStatus("방 코드 16자 이상 입력 후 「연결」을 누르세요.", false);
          return;
        }
        firestoreDb = initFirestoreDb();
        if (!firestoreDb) {
          updateFbStatus("Firebase 초기화 실패 · 설정 JSON 확인", false);
          return;
        }
        attachFirestoreListener();
        updateFbStatus(
          "연결됨 · 클라우드 저장 중 (방 " + room.slice(0, 10) + "…)",
          true
        );
      }

      var defaultSettings = function () {
        return {
          loanAmount: 70030000,
          minusBalance: -63769347,
          withdrawBaseline: 6530653,
          milestones: [
            { phase: "5차", dueDate: "2027-12-10", cumulative: 75520000 },
            { phase: "6차", dueDate: "2028-03-10", cumulative: 151040000 }
          ]
        };
      };

      function loadSettings() {
        try {
          var r = localStorage.getItem(KEY_SETTINGS);
          if (!r) return defaultSettings();
          var o = JSON.parse(r);
          var d = defaultSettings();
          return {
            loanAmount: Number(o.loanAmount) || d.loanAmount,
            minusBalance: Number(o.minusBalance) || d.minusBalance,
            withdrawBaseline: Number(o.withdrawBaseline) || d.withdrawBaseline,
            milestones: Array.isArray(o.milestones) && o.milestones.length >= 2
              ? o.milestones
              : d.milestones
          };
        } catch (e) {
          return defaultSettings();
        }
      }

      function saveSettings(s) {
        localStorage.setItem(KEY_SETTINGS, JSON.stringify(s));
      }

      function normalizeLedgerEntry(e) {
        if (!e || typeof e !== "object") return null;
        if (
          e.kind === "deposit_minus" ||
          e.kind === "pay_minus" ||
          e.kind === "pay_other" ||
          e.kind === "use_urgent"
        )
          return e;
        if (e.source === "minus") return { id: e.id, date: e.date, amount: e.amount, kind: "pay_minus" };
        if (e.source === "card") return { id: e.id, date: e.date, amount: e.amount, kind: "pay_other" };
        if (e.source === "other") return { id: e.id, date: e.date, amount: e.amount, kind: "pay_other" };
        if (e.fromMinus !== false) return { id: e.id, date: e.date, amount: e.amount, kind: "pay_minus" };
        return { id: e.id, date: e.date, amount: e.amount, kind: "pay_other" };
      }

      function loadLedger() {
        try {
          var raw = localStorage.getItem(KEY_LEDGER);
          var arr;
          if (raw) {
            arr = JSON.parse(raw);
          } else {
            var leg = localStorage.getItem(KEY_LEGACY);
            arr = leg ? JSON.parse(leg) : [];
            arr = Array.isArray(arr) ? arr.map(normalizeLedgerEntry).filter(Boolean) : [];
            if (arr.length) {
              saveLedger(arr);
            }
          }
          if (!Array.isArray(arr)) return [];
          arr = arr.map(normalizeLedgerEntry).filter(Boolean);
          return arr;
        } catch (e) {
          return [];
        }
      }

      function saveLedger(a) {
        localStorage.setItem(KEY_LEDGER, JSON.stringify(a));
      }

      function money(n) {
        if (n == null || isNaN(n)) return "—";
        return new Intl.NumberFormat("ko-KR").format(Math.round(n)) + "원";
      }

      function parseNum(s) {
        var t = String(s || "").replace(/,/g, "").replace(/\s/g, "");
        if (t === "" || t === "-") return 0;
        var n = parseInt(t, 10);
        return isNaN(n) ? 0 : n;
      }

      function formatCommaDisplay(n) {
        if (n === null || n === undefined || n === "") return "";
        var num = typeof n === "number" ? n : parseNum(String(n));
        if (isNaN(num)) return "";
        var neg = num < 0;
        var f = new Intl.NumberFormat("ko-KR").format(Math.abs(num));
        return neg ? "-" + f : f;
      }

      /** 금액 입력: 입력 중·블러 시 콤마 · 포커스 시 숫자만 */
      function bindMoneyInput(el, allowNegative) {
        if (!el) return;
        allowNegative = !!allowNegative;
        el.addEventListener("focus", function () {
          var t = String(el.value).replace(/,/g, "").trim();
          if (t === "") return;
          el.value = t;
        });
        el.addEventListener("blur", function () {
          var t = String(el.value).replace(/,/g, "").trim();
          if (t === "" || (allowNegative && t === "-")) {
            if (t !== "-") el.value = "";
            return;
          }
          var n = parseInt(t, 10);
          if (isNaN(n)) return;
          el.value = formatCommaDisplay(n);
        });
        el.addEventListener("input", function () {
          var raw = String(el.value).replace(/,/g, "");
          if (allowNegative) {
            var neg = false;
            var rest = raw;
            if (rest.indexOf("-") === 0) {
              neg = true;
              rest = rest.slice(1);
            }
            rest = rest.replace(/\D/g, "");
            if (rest === "" && !neg) {
              el.value = "";
              return;
            }
            if (rest === "" && neg) {
              el.value = "-";
              return;
            }
            var n1 = parseInt(rest, 10);
            if (isNaN(n1)) return;
            if (neg) n1 = -n1;
            el.value = formatCommaDisplay(n1);
          } else {
            var digits = raw.replace(/\D/g, "");
            if (digits === "") {
              el.value = "";
              return;
            }
            var n2 = parseInt(digits, 10);
            if (isNaN(n2)) return;
            el.value = formatCommaDisplay(n2);
          }
        });
      }

      function todayISO() {
        var d = new Date();
        var z = function (x) {
          return (x < 10 ? "0" : "") + x;
        };
        return d.getFullYear() + "-" + z(d.getMonth() + 1) + "-" + z(d.getDate());
      }

      function monthDiff(startIso, endIso) {
        var a = new Date(startIso + "T12:00:00");
        var b = new Date(endIso + "T12:00:00");
        if (isNaN(a.getTime()) || isNaN(b.getTime())) return 0;
        if (a > b) return 0;
        var m =
          (b.getFullYear() - a.getFullYear()) * 12 + (b.getMonth() - a.getMonth());
        return Math.max(0, m);
      }

      function sumKind(entries, kind) {
        return entries.reduce(function (a, e) {
          if (e.kind === kind) return a + (Number(e.amount) || 0);
          return a;
        }, 0);
      }

      function computeD(settings, entries) {
        var d0 = Number(settings.withdrawBaseline) || 0;
        var add = sumKind(entries, "deposit_minus");
        var sub =
          sumKind(entries, "pay_minus") + sumKind(entries, "use_urgent");
        return d0 + add - sub;
      }

      /** 엑셀 F열과 동일 */
      function excelSummary(Aiso, D, m0, m1) {
        var K2 = Number(m0.cumulative) || 0;
        var K3 = Number(m1.cumulative) || 0;
        var H2 = m0.phase || "5차";
        var H3 = m1.phase || "6차";
        var I2 = m0.dueDate;
        var I3 = m1.dueDate;

        if (D >= K3) return { text: "완료", done: true };

        function part(H, Kneed, Iend) {
          var need = Kneed - D;
          var months = monthDiff(Aiso, Iend);
          var datePart =
            Aiso > Iend ? "목표일 경과" : months + "개월 남음";
          return (
            H +
            " " +
            new Intl.NumberFormat("ko-KR").format(Math.max(0, Math.round(need))) +
            "원 필요 / " +
            datePart
          );
        }

        if (D >= K2) {
          return { text: part(H3, K3, I3), done: false };
        }
        return { text: part(H2, K2, I2), done: false };
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function render() {
        var settings = loadSettings();
        var entries = loadLedger();
        var D = computeD(settings, entries);

        var m = settings.milestones;
        var m0 = m[0];
        var m1 = m[1];
        var K3 = Number(m1.cumulative) || 1;

        var refDate = document.getElementById("tx-date").value || todayISO();
        var sum = excelSummary(refDate, D, m0, m1);

        document.getElementById("disp-d").textContent = money(D);
        document.getElementById("disp-d").className = "num" + (D < 0 ? " bad" : "");
        document.getElementById("disp-d-sub").textContent =
          "기준 " +
          money(settings.withdrawBaseline) +
          " · 마통입금 +" +
          money(sumKind(entries, "deposit_minus")) +
          " · 납부 −" +
          money(sumKind(entries, "pay_minus")) +
          " · 인출 −" +
          money(sumKind(entries, "use_urgent"));

        var pill = document.getElementById("pill-wrap");
        if (sum.done) {
          pill.innerHTML =
            '<span class="status-pill ok">달성 · 6차 누적(K₃) 이상</span>';
        } else {
          pill.innerHTML = '<span class="status-pill">미달성</span>';
        }

        document.getElementById("formula-text").innerHTML =
          "<strong>정리</strong> · " + escapeHtml(sum.text);

        var pct = Math.min(100, Math.max(0, (D / K3) * 100));
        document.getElementById("g-bar").style.width = pct + "%";
        document.getElementById("g-title").textContent =
          "6차 누적 목표 (" + money(K3) + ") 까지";
        document.getElementById("g-meta").textContent =
          Math.round(pct) +
          "% 채움 · " +
          money(Math.max(0, K3 - D)) +
          " 남음";

        document.getElementById("ms-table").innerHTML =
          "<thead><tr><th>차수</th><th>입금일</th><th>누적 목표</th></tr></thead><tbody>" +
          "<tr><td>" +
          escapeHtml(m0.phase) +
          "</td><td>" +
          m0.dueDate +
          "</td><td>" +
          money(m0.cumulative) +
          "</td></tr>" +
          "<tr><td>" +
          escapeHtml(m1.phase) +
          "</td><td>" +
          m1.dueDate +
          "</td><td>" +
          money(m1.cumulative) +
          "</td></tr></tbody>";

        var sorted = entries.slice().sort(function (a, b) {
          if (String(b.date) !== String(a.date))
            return String(b.date).localeCompare(String(a.date));
          return String(b.id).localeCompare(String(a.id));
        });

        var log = document.getElementById("log");
        if (!sorted.length) {
          log.innerHTML =
            '<p style="color:#78716c;font-size:0.85rem">내역 없음 · 월급 넣었으면 「마통에 입금」</p>';
        } else {
          log.innerHTML = sorted
            .map(function (e) {
              var tag =
                e.kind === "deposit_minus"
                  ? '<span class="tag di">마통입금</span>'
                  : e.kind === "pay_minus"
                    ? '<span class="tag pm">마통납부</span>'
                    : e.kind === "use_urgent"
                      ? '<span class="tag ug">급사용</span>'
                      : '<span class="tag po">카드등</span>';
              return (
                '<div class="log-row" data-id="' +
                escapeHtml(e.id) +
                '"><div><strong>' +
                money(Number(e.amount)) +
                "</strong><br /><small style=color:#78716c>" +
                e.date +
                "</small></div>" +
                tag +
                '<button type="button" class="del">삭제</button></div>'
              );
            })
            .join("");
        }

        log.querySelectorAll(".del").forEach(function (btn) {
          btn.onclick = function () {
            var id = btn.closest(".log-row").getAttribute("data-id");
            persistLedger(loadLedger().filter(function (x) {
              return x.id !== id;
            }));
            render();
          };
        });

        if (!document.getElementById("tx-date").dataset.touched) {
          document.getElementById("tx-date").value = todayISO();
        }
      }

      function fillSettingsForm() {
        var s = loadSettings();
        document.getElementById("set-loan").value = formatCommaDisplay(
          s.loanAmount
        );
        document.getElementById("set-balance").value = formatCommaDisplay(
          s.minusBalance
        );
        document.getElementById("set-d0").value = formatCommaDisplay(
          s.withdrawBaseline
        );
        document.getElementById("m1-date").value = s.milestones[0].dueDate;
        document.getElementById("m1-k").value = formatCommaDisplay(
          s.milestones[0].cumulative
        );
        document.getElementById("m2-date").value = s.milestones[1].dueDate;
        document.getElementById("m2-k").value = formatCommaDisplay(
          s.milestones[1].cumulative
        );
        var fbr = document.getElementById("fb-room");
        if (fbr)
          fbr.value = sanitizeRoomKey(localStorage.getItem(KEY_FB_ROOM)) || "";
      }

      document.querySelectorAll(".tabs button").forEach(function (b) {
        b.addEventListener("click", function () {
          var p = b.getAttribute("data-page");
          document.querySelectorAll(".tabs button").forEach(function (x) {
            x.classList.toggle("on", x === b);
          });
          document.querySelectorAll(".page").forEach(function (pg) {
            pg.classList.toggle("on", pg.id === "page-" + p);
          });
          if (p === "settings") fillSettingsForm();
        });
      });

      document.getElementById("tx-date").addEventListener("change", function () {
        document.getElementById("tx-date").dataset.touched = "1";
        render();
      });

      document.getElementById("btn-add").addEventListener("click", function () {
        var amt = parseNum(document.getElementById("tx-amt").value);
        if (amt <= 0) return;
        var kind = document.getElementById("tx-kind").value;
        var okKinds =
          "deposit_minus,pay_minus,pay_other,use_urgent".split(",");
        if (okKinds.indexOf(kind) === -1) kind = "pay_other";
        var list = loadLedger();
        list.push({
          id: "t-" + Date.now(),
          date: document.getElementById("tx-date").value || todayISO(),
          amount: amt,
          kind: kind
        });
        persistLedger(list);
        document.getElementById("tx-amt").value = "";
        render();
      });

      document.getElementById("btn-save-settings").addEventListener("click", function () {
        var s = {
          loanAmount: parseNum(document.getElementById("set-loan").value),
          minusBalance: parseNum(document.getElementById("set-balance").value),
          withdrawBaseline: parseNum(document.getElementById("set-d0").value),
          milestones: [
            {
              phase: "5차",
              dueDate: document.getElementById("m1-date").value || "2027-12-10",
              cumulative: parseNum(document.getElementById("m1-k").value)
            },
            {
              phase: "6차",
              dueDate: document.getElementById("m2-date").value || "2028-03-10",
              cumulative: parseNum(document.getElementById("m2-k").value)
            }
          ]
        };
        persistSettings(s);
        alert("저장했습니다");
        render();
      });


      bindMoneyInput(document.getElementById("tx-amt"), false);
      bindMoneyInput(document.getElementById("set-loan"), false);
      bindMoneyInput(document.getElementById("set-balance"), true);
      bindMoneyInput(document.getElementById("set-d0"), false);
      bindMoneyInput(document.getElementById("m1-k"), false);
      bindMoneyInput(document.getElementById("m2-k"), false);

      function kindToKo(k) {
        var map = {
          deposit_minus: "마통입금",
          pay_minus: "마통납부",
          use_urgent: "급사용",
          pay_other: "카드등"
        };
        return map[k] || k;
      }

      function koToKind(s) {
        var map = {
          마통입금: "deposit_minus",
          마통납부: "pay_minus",
          급사용: "use_urgent",
          카드등: "pay_other"
        };
        var t = String(s || "").trim();
        if (map[t]) return map[t];
        if (
          ["deposit_minus", "pay_minus", "use_urgent", "pay_other"].indexOf(t) >=
          0
        )
          return t;
        return "pay_other";
      }

      function excelSerialToISO(n) {
        var utcDays = Math.floor(n - 25569);
        var d = new Date(utcDays * 86400 * 1000);
        var y = d.getUTCFullYear();
        var m = String(d.getUTCMonth() + 1).padStart(2, "0");
        var day = String(d.getUTCDate()).padStart(2, "0");
        return y + "-" + m + "-" + day;
      }

      function normalizeImportedDate(v) {
        if (v == null || v === "") return "";
        if (v instanceof Date && !isNaN(v.getTime()))
          return v.toISOString().slice(0, 10);
        if (typeof v === "number") return excelSerialToISO(v);
        var s = String(v).trim();
        if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);
        return s.slice(0, 10);
      }

      function exportToXlsx() {
        if (typeof XLSX === "undefined") {
          alert(
            "엑셀 기능을 불러오지 못했습니다. 인터넷에 연결된 뒤 다시 시도하세요."
          );
          return;
        }
        var settings = loadSettings();
        var ledger = loadLedger();
        var wb = XLSX.utils.book_new();

        var setupRows = [
          ["항목", "값"],
          ["loanAmount", settings.loanAmount],
          ["minusBalance", settings.minusBalance],
          ["withdrawBaseline", settings.withdrawBaseline],
          ["m1_phase", settings.milestones[0].phase],
          ["m1_dueDate", settings.milestones[0].dueDate],
          ["m1_cumulative", settings.milestones[0].cumulative],
          ["m2_phase", settings.milestones[1].phase],
          ["m2_dueDate", settings.milestones[1].dueDate],
          ["m2_cumulative", settings.milestones[1].cumulative]
        ];
        XLSX.utils.book_append_sheet(
          wb,
          XLSX.utils.aoa_to_sheet(setupRows),
          "설정"
        );

        var rows = [["날짜", "금액", "종류", "ID"]];
        ledger.forEach(function (e) {
          rows.push([e.date, e.amount, kindToKo(e.kind), e.id]);
        });
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "내역");

        var D = computeD(settings, ledger);
        var sum = excelSummary(
          todayISO(),
          D,
          settings.milestones[0],
          settings.milestones[1]
        );
        var snap = [
          ["항목", "값"],
          ["내보낸_시각_ISO", new Date().toISOString()],
          ["출금가능_D", D],
          ["정리", sum.text],
          ["달성", sum.done ? "완료" : "진행중"]
        ];
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(snap), "요약");

        XLSX.writeFile(wb, "happy_house_data.xlsx");
      }

      function importFromXlsx(file) {
        if (typeof XLSX === "undefined") {
          alert("엑셀 기능을 불러오지 못했습니다.");
          return;
        }
        var reader = new FileReader();
        reader.onload = function (ev) {
          try {
            var buf = new Uint8Array(ev.target.result);
            var wb = XLSX.read(buf, { type: "array", cellDates: true });
            var ss = wb.Sheets["설정"];
            if (!ss) {
              alert('시트「설정」이 없습니다. 이 앱에서 내보낸 xlsx인지 확인하세요.');
              return;
            }
            var setupArr = XLSX.utils.sheet_to_json(ss, { header: 1 });
            var kv = {};
            for (var i = 1; i < setupArr.length; i++) {
              var row = setupArr[i];
              if (row && row[0] != null && row[0] !== "")
                kv[String(row[0]).trim()] = row[1];
            }
            var def = defaultSettings();
            var newSettings = {
              loanAmount: Number(kv.loanAmount) || def.loanAmount,
              minusBalance: Number(kv.minusBalance) || def.minusBalance,
              withdrawBaseline: Number(kv.withdrawBaseline) || def.withdrawBaseline,
              milestones: [
                {
                  phase: kv.m1_phase || def.milestones[0].phase,
                  dueDate: String(kv.m1_dueDate || def.milestones[0].dueDate).slice(
                    0,
                    10
                  ),
                  cumulative:
                    Number(kv.m1_cumulative) || def.milestones[0].cumulative
                },
                {
                  phase: kv.m2_phase || def.milestones[1].phase,
                  dueDate: String(kv.m2_dueDate || def.milestones[1].dueDate).slice(
                    0,
                    10
                  ),
                  cumulative:
                    Number(kv.m2_cumulative) || def.milestones[1].cumulative
                }
              ]
            };
            saveSettings(newSettings);

            var ls = wb.Sheets["내역"];
            var newLedger = [];
            if (ls) {
              var lr = XLSX.utils.sheet_to_json(ls, { header: 1 });
              for (var j = 1; j < lr.length; j++) {
                var r = lr[j];
                if (!r || r.length < 2) continue;
                var ds = normalizeImportedDate(r[0]);
                var amt =
                  typeof r[1] === "number"
                    ? r[1]
                    : parseNum(String(r[1]));
                var kind = koToKind(r[2]);
                var id =
                  r[3] != null && String(r[3]).trim() !== ""
                    ? String(r[3]).trim()
                    : "imp-" + j + "-" + Date.now();
                if (!ds || !amt) continue;
                newLedger.push({
                  id: id,
                  date: ds,
                  amount: amt,
                  kind: kind
                });
              }
            }
            saveLedger(newLedger);
            scheduleCloudPush();
            alert("불러오기 완료했습니다.");
            fillSettingsForm();
            render();
          } catch (err) {
            alert("파일을 읽지 못했습니다: " + err.message);
          }
        };
        reader.readAsArrayBuffer(file);
      }

      document.getElementById("btn-export-xlsx").addEventListener("click", exportToXlsx);

      document.getElementById("import-xlsx").addEventListener("change", function (ev) {
        var f = ev.target.files && ev.target.files[0];
        ev.target.value = "";
        if (!f) return;
        importFromXlsx(f);
      });


      localStorage.setItem(KEY_FB_ROOM, ROOM_CODE);
      refreshFbUi();
      render();
      setTimeout(function () {
        var localMs = parseInt(localStorage.getItem(KEY_LOCAL_TS) || "0", 10);
        if (localMs > 0) scheduleCloudPush();
      }, 2000);
    })();
  </script>
