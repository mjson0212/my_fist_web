<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>상휘민정 집 마련 🏡</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fffef5;
      --card: #ffffff;
      --yellow: #fde68a;
      --yellow-soft: #fef9c3;
      --accent: #44403c;
      --success: #15803d;
      --success-light: #dcfce7;
      --danger: #b91c1c;
      --danger-light: #fee2e2;
      --text: #1c1917;
      --muted: #78716c;
      --border: #ede8d8;
      --radius: 16px;
      --shadow: 0 2px 14px rgba(100,80,40,.07), 0 1px 3px rgba(0,0,0,.03);
      --shadow-sm: 0 1px 6px rgba(0,0,0,.04);
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 64px;
    }

    /* ── Header ── */
    header {
      background: #ffffff;
      border-bottom: 3px solid var(--yellow);
      padding: 20px 20px 16px;
      text-align: center;
    }
    .header-icon { font-size: 28px; margin-bottom: 4px; }
    header h1 { font-size: 19px; font-weight: 800; color: #292524; letter-spacing: -.4px; }
    header .subtitle { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .sync-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 99px;
      margin-top: 10px;
      border: 1px solid;
    }
    .sync-badge.ok   { background: var(--success-light); color: #15803d; border-color: #bbf7d0; }
    .sync-badge.busy { background: var(--yellow-soft); color: #78350f; border-color: var(--yellow); }
    .sync-badge.err  { background: var(--danger-light); color: #b91c1c; border-color: #fecaca; }

    /* ── Tabs ── */
    nav.tabs {
      display: flex;
      background: white;
      border-bottom: 1.5px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }
    nav.tabs button {
      flex: 1;
      padding: 14px 4px 12px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 13px;
      font-family: 'Pretendard', sans-serif;
      color: #a8a29e;
      font-weight: 600;
      border-bottom: 2.5px solid transparent;
      transition: color .15s, border-color .15s;
    }
    nav.tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Tab sections ── */
    .tab { display: none; padding: 16px; max-width: 600px; margin: 0 auto; }
    .tab.active { display: block; animation: fadeUp .22s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Hero card ── */
    .hero-card {
      background: linear-gradient(135deg, #fef9c3 0%, #fefce8 100%);
      border: 1.5px solid var(--yellow);
      border-radius: var(--radius);
      padding: 22px 20px;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
    }
    .hero-card::after {
      content: '🏡';
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 52px;
      opacity: .2;
    }
    .hero-label { font-size: 12px; color: var(--muted); font-weight: 600; }
    .hero-amount { font-size: 30px; font-weight: 900; letter-spacing: -1px; margin: 6px 0 4px; color: #1c1917; }
    .hero-sub { font-size: 12px; color: var(--muted); }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
      border: 1px solid var(--border);
    }
    .card-title {
      font-size: 15px;
      font-weight: 800;
      color: #292524;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 18px;
      background: var(--yellow);
      border-radius: 99px;
      flex-shrink: 0;
    }

    /* ── Rows ── */
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      gap: 8px;
    }
    .row:last-child { border-bottom: none; }
    .row label { color: #a8a29e; flex-shrink: 0; font-size: 13px; font-weight: 500; }
    .row .val { font-weight: 700; text-align: right; }
    .row .val.big { font-size: 22px; }
    .row .val.green { color: var(--success); }
    .row .val.red   { color: var(--danger); }

    /* ── Progress ── */
    .gauge { margin-top: 16px; }
    .gauge-header {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 700;
    }
    .bar { background: #f5f0e4; border-radius: 99px; height: 12px; overflow: hidden; }
    .fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #fcd34d, #fde68a);
      transition: width .8s cubic-bezier(.25,.1,.25,1);
      position: relative;
    }
    .fill::after {
      content: '';
      position: absolute;
      top: 2px; left: 6px; right: 6px;
      height: 4px;
      background: rgba(255,255,255,.55);
      border-radius: 99px;
    }
    .fill.green { background: linear-gradient(90deg, #15803d, #4ade80); }

    /* ── Badge ── */
    .badge-done {
      display: inline-block;
      background: var(--success-light);
      color: var(--success);
      padding: 2px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 800;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* ── Forms ── */
    .form-group { margin-bottom: 12px; }
    .form-group > label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #78716c;
      margin-bottom: 5px;
    }
    .hint { font-size: 11px; color: #b8b2a8; margin-top: 5px; line-height: 1.5; }

    input[type=text], input[type=date], select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      color: var(--text);
      background: #fffef8;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      -webkit-appearance: none;
      appearance: none;
      font-family: 'Pretendard', sans-serif;
    }
    input:focus, select:focus {
      border-color: #fbbf24;
      box-shadow: 0 0 0 3px rgba(251,191,36,.15);
      background: white;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      transition: opacity .12s, transform .12s;
      white-space: nowrap;
      font-family: 'Pretendard', sans-serif;
    }
    .btn:active { opacity: .8; transform: scale(.97); }
    .btn-primary { background: #44403c; color: white; }
    .btn-success { background: linear-gradient(135deg, #15803d, #22c55e); color: white; }
    .btn-danger  { background: #dc2626; color: white; }
    .btn-gray    { background: #f0ece0; color: #78716c; }
    .btn-full    { width: 100%; }
    .btn-sm      { padding: 5px 11px; font-size: 12px; border-radius: 7px; }

    /* ── Edit banner ── */
    .edit-banner {
      background: var(--yellow-soft);
      border: 1.5px solid var(--yellow);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      color: #78350f;
      margin-bottom: 12px;
      display: none;
    }
    .edit-banner.show { display: block; }

    /* ── Transaction list ── */
    .tx-list { display: flex; flex-direction: column; gap: 10px; }
    .tx-item {
      background: white;
      border-radius: 14px;
      padding: 13px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
    }
    .tx-tag {
      font-size: 10px;
      font-weight: 800;
      padding: 3px 9px;
      border-radius: 99px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tx-tag.입금   { background: var(--success-light); color: #15803d; }
    .tx-tag.출금   { background: var(--danger-light); color: #b91c1c; }
    .tx-tag.중도금 { background: var(--yellow-soft); color: #78350f; }
    .tx-info { flex: 1; min-width: 0; }
    .tx-date { font-size: 11px; color: #b8b2a8; font-weight: 500; margin-bottom: 2px; }
    .tx-memo { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
    .tx-amount { font-size: 15px; font-weight: 800; white-space: nowrap; flex-shrink: 0; }
    .tx-amount.입금   { color: #15803d; }
    .tx-amount.출금   { color: #b91c1c; }
    .tx-amount.중도금 { color: #78350f; }
    .tx-btns { display: flex; gap: 5px; flex-shrink: 0; }

    /* ── Monthly summary ── */
    .month-section { margin-top: 24px; }
    .month-section h3 { font-size: 13px; font-weight: 800; color: #78716c; margin-bottom: 10px; }
    .month-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 10px 14px;
      background: white;
      border-radius: 10px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 6px;
      border: 1px solid var(--border);
      align-items: center;
    }
    .month-row .m-date { color: #a8a29e; font-weight: 600; }
    .month-row .m-in   { color: #15803d; font-weight: 700; }
    .month-row .m-out  { color: #b91c1c; font-weight: 700; }

    .s-sep { height: 1px; background: var(--border); margin: 14px 0; }
    .loading { text-align: center; padding: 52px; color: #b8b2a8; }

    @media (max-width: 440px) {
      .tab { padding: 12px; }
      nav.tabs button { font-size: 12px; }
      .hero-amount { font-size: 24px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-icon">🏡</div>
  <h1>상휘민정 집 마련</h1>
  <p class="subtitle">함께 모아가는 우리 집</p>
  <div id="syncBadge" class="sync-badge busy">● 연결 중...</div>
</header>

<nav class="tabs">
  <button class="active" onclick="switchTab('dashboard',this)">대시보드</button>
  <button onclick="switchTab('history',this)">입출금 내역</button>
  <button onclick="switchTab('settings',this)">설정</button>
</nav>

<!-- ═══ 대시보드 ═══ -->
<section id="tab-dashboard" class="tab active">
  <div id="dashContent" class="loading">데이터 불러오는 중...</div>
</section>

<!-- ═══ 입출금 내역 ═══ -->
<section id="tab-history" class="tab">
  <div class="card">
    <div class="card-title">내역 추가 / 수정</div>
    <div id="editBanner" class="edit-banner">✏️ 수정 모드 — 내용을 수정 후 저장하세요</div>
    <div class="form-group">
      <label>날짜</label>
      <input type="date" id="txDate">
    </div>
    <div class="form-group">
      <label>구분</label>
      <select id="txType">
        <option value="입금">입금</option>
        <option value="출금">출금</option>
        <option value="중도금 납부">중도금 납부</option>
      </select>
    </div>
    <div class="form-group">
      <label>금액 (원)</label>
      <input type="text" inputmode="numeric" id="txAmount" placeholder="금액 입력">
    </div>
    <div class="form-group">
      <label>메모</label>
      <input type="text" id="txMemo" placeholder="예: 월 저축">
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" style="flex:1" onclick="submitTx()">저장</button>
      <button class="btn btn-gray btn-sm" id="cancelEditBtn" style="display:none" onclick="cancelEdit()">취소</button>
    </div>
  </div>
  <div id="histContent" class="loading">데이터 불러오는 중...</div>
</section>

<!-- ═══ 설정 ═══ -->
<section id="tab-settings" class="tab">
  <div class="card">
    <div class="card-title">마이너스통장</div>
    <div class="form-group">
      <label>마통 한도 (원)</label>
      <input type="text" inputmode="numeric" id="s_마통한도" placeholder="80,000,000">
    </div>
    <div class="form-group">
      <label>초기 출금 가능 금액 (원)</label>
      <input type="text" inputmode="numeric" id="s_초기출금가능금액" placeholder="20,000,000">
      <p class="hint">앱을 처음 사용한 날 확인한 잔액 — 기준점이므로 한 번만 입력</p>
    </div>
    <div class="form-group">
      <label>현재 출금 가능 금액 (원)</label>
      <input type="text" inputmode="numeric" id="s_현재출금가능금액" placeholder="20,000,000">
      <p class="hint">오늘 은행 앱의 실제 출금 가능 잔액 — 잔액이 바뀔 때마다 업데이트</p>
    </div>
  </div>

  <div class="card">
    <div class="card-title">5회차 중도금</div>
    <div class="form-group">
      <label>5회차 필요 금액 (원)</label>
      <input type="text" inputmode="numeric" id="s_회차5필요금액" placeholder="75,000,000">
    </div>
    <div class="form-group">
      <label>5회차 납부 예정일</label>
      <input type="date" id="s_회차5납부예정일">
    </div>
    <div class="s-sep"></div>
    <button id="btn5Complete" class="btn btn-success btn-full" onclick="toggle5Complete()">5회차 완료 처리</button>
  </div>

  <div class="card">
    <div class="card-title">6회차 중도금</div>
    <div class="form-group">
      <label>6회차 필요 금액 (원)</label>
      <input type="text" inputmode="numeric" id="s_회차6필요금액" placeholder="75,000,000">
    </div>
    <div class="form-group">
      <label>6회차 납부 예정일</label>
      <input type="date" id="s_회차6납부예정일">
    </div>
  </div>

  <div class="card">
    <div class="card-title">저축 목표</div>
    <div class="form-group">
      <label>월 목표 저축액 (원)</label>
      <input type="text" inputmode="numeric" id="s_월목표저축액" placeholder="5,000,000">
    </div>
  </div>

  <button class="btn btn-primary btn-full" onclick="saveSettings()" style="margin-top:4px">설정 저장</button>
</section>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyD-fxzMLxJeIi1wyIMMDQ_Sh32rd1LrRmk",
  authDomain: "my-happy-home-bluecity.firebaseapp.com",
  projectId: "my-happy-home-bluecity",
  storageBucket: "my-happy-home-bluecity.firebasestorage.app",
  messagingSenderId: "190778736246",
  appId: "1:190778736246:web:2bd6e0273d155f759ba957"
});

const db = firebase.firestore();
const ROOM_ID = "sanghui_minjung_happyhouse_2028";
const docRef = db.collection("happy_house_sync").doc(ROOM_ID);

let appData = { settings: {}, transactions: [] };
let editingId = null;

/* ── 콤마 입력 포맷 ── */
const MONEY_IDS = ['txAmount','s_마통한도','s_초기출금가능금액','s_현재출금가능금액',
                   's_회차5필요금액','s_회차6필요금액','s_월목표저축액'];

function addCommas(str) {
  const digits = str.replace(/[^\d]/g, '');
  if (!digits) return '';
  return parseInt(digits).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function parseAmt(id) {
  return parseInt((document.getElementById(id).value || '').replace(/,/g, '')) || 0;
}

function setMoneyValue(id, n) {
  const el = document.getElementById(id);
  if (!el) return;
  el.value = n ? n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',') : '';
}

document.addEventListener('DOMContentLoaded', () => {
  MONEY_IDS.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', function() {
      const cursor = this.selectionStart;
      const prevLen = this.value.length;
      this.value = addCommas(this.value);
      const diff = this.value.length - prevLen;
      this.setSelectionRange(cursor + diff, cursor + diff);
    });
  });
  document.getElementById('txDate').value = new Date().toISOString().slice(0, 10);
});

/* ── 탭 전환 ── */
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('nav.tabs button').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

/* ── 유틸 ── */
function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',') + '원';
}

function fmtDate(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-');
  if (!y || !m || !d) return dateStr;
  return y + '년 ' + parseInt(m) + '월 ' + parseInt(d) + '일';
}

function monthsUntil(dateStr) {
  if (!dateStr) return null;
  const t = new Date(dateStr);
  const now = new Date();
  return Math.max(0, (t.getFullYear() - now.getFullYear()) * 12 + (t.getMonth() - now.getMonth()));
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

/* ── Firestore 리스너 ── */
docRef.onSnapshot(snap => {
  const badge = document.getElementById('syncBadge');
  if (snap.exists) {
    appData = snap.data();
    appData.transactions = appData.transactions || [];
    appData.settings     = appData.settings     || {};
  }
  badge.textContent = '● 동기화됨';
  badge.className   = 'sync-badge ok';
  renderDashboard();
  renderHistory();
  renderSettingsForm();
}, err => {
  document.getElementById('syncBadge').textContent = '● 연결 오류';
  document.getElementById('syncBadge').className   = 'sync-badge err';
  console.error(err);
});

async function saveToFirestore(partial) {
  const badge = document.getElementById('syncBadge');
  badge.textContent = '● 저장 중...';
  badge.className   = 'sync-badge busy';
  await docRef.set(partial, { merge: true });
}

/* ── 대시보드 ── */
function renderDashboard() {
  const s   = appData.settings;
  const txs = appData.transactions || [];

  const 마통한도     = s.마통한도          || 0;
  const 초기출금가능  = s.초기출금가능금액  || 0;
  const 현재출금가능  = s.현재출금가능금액  || 0;
  const 마통사용     = 마통한도 - 현재출금가능;

  const 총입금 = txs.filter(t => t.type === '입금').reduce((a,t) => a + (t.amount||0), 0);
  const 총출금 = txs.filter(t => t.type === '출금').reduce((a,t) => a + (t.amount||0), 0);
  const 현재모은금액 = (현재출금가능 - 초기출금가능) + 총입금 - 총출금;

  const 회차5완료          = s.회차5완료 || false;
  const 회차5완료시모은금액 = s.회차5완료시모은금액 || 0;
  const 회차5필요          = s.회차5필요금액 || 0;
  const 회차6필요          = s.회차6필요금액 || 0;
  const 월목표             = s.월목표저축액 || 0;

  let 회차5모은, 회차5부족, 회차5률;
  if (회차5완료) {
    회차5모은 = 회차5필요; 회차5부족 = 0; 회차5률 = 100;
  } else {
    회차5모은 = Math.max(0, 현재모은금액);
    회차5부족 = Math.max(0, 회차5필요 - 회차5모은);
    회차5률   = 회차5필요 > 0 ? Math.min(100, 회차5모은 / 회차5필요 * 100) : 0;
  }
  const 회차5개월   = monthsUntil(s.회차5납부예정일);
  const 회차5월필요 = (회차5개월 > 0 && 회차5부족 > 0) ? 회차5부족 / 회차5개월 : 0;

  let 회차6모은 = 회차5완료
    ? Math.max(0, 현재모은금액 - 회차5완료시모은금액)
    : Math.max(0, 현재모은금액 - 회차5필요);
  const 회차6부족   = Math.max(0, 회차6필요 - 회차6모은);
  const 회차6률     = 회차6필요 > 0 ? Math.min(100, 회차6모은 / 회차6필요 * 100) : 0;
  const 회차6개월   = monthsUntil(s.회차6납부예정일);
  const 회차6월필요 = (회차6개월 > 0 && 회차6부족 > 0) ? 회차6부족 / 회차6개월 : 0;

  const fillCls = pct => pct >= 100 ? 'green' : '';

  const monthText = m => m === null ? '' : m === 0 ? '이번 달' : m + '개월 후';

  const needRow = (월필요, 월목표) => !월필요 ? '' :
    `<div class="row"><label>월 필요 저축액</label>
      <span class="val ${월필요 > 월목표 ? 'red' : 'green'}">${fmt(월필요)}</span></div>`;

  document.getElementById('dashContent').innerHTML = `
    <div class="hero-card">
      <div class="hero-label">현재 모은 금액</div>
      <div class="hero-amount">${fmt(현재모은금액)}</div>
      <div class="hero-sub">출금 가능 잔액 ${fmt(현재출금가능)}</div>
    </div>

    <div class="card">
      <div class="card-title">5회차 중도금${회차5완료 ? '<span class="badge-done">완료 ✓</span>' : ''}</div>
      ${회차5완료 ? `<div style="color:var(--success);font-weight:800;padding:10px 0;font-size:15px">🎉 5회차 납부 완료!</div>` : `
      <div class="row"><label>목표</label><span class="val">${fmt(회차5필요)}</span></div>
      <div class="row"><label>현재 모은 금액</label><span class="val green">${fmt(회차5모은)}</span></div>
      <div class="row"><label>부족 금액</label><span class="val red">${fmt(회차5부족)}</span></div>
      ${s.회차5납부예정일 ? `<div class="row"><label>납부 예정일</label><span class="val">${fmtDate(s.회차5납부예정일)} · ${monthText(회차5개월)}</span></div>` : ''}
      ${needRow(회차5월필요, 월목표)}`}
      <div class="gauge">
        <div class="gauge-header"><span>달성률</span><span>${회차5률.toFixed(1)}%</span></div>
        <div class="bar"><div class="fill ${fillCls(회차5률)}" style="width:${회차5률}%"></div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">6회차 중도금</div>
      <div class="row"><label>목표</label><span class="val">${fmt(회차6필요)}</span></div>
      <div class="row"><label>현재 모은 금액</label><span class="val green">${fmt(회차6모은)}</span></div>
      <div class="row"><label>부족 금액</label><span class="val red">${fmt(회차6부족)}</span></div>
      ${s.회차6납부예정일 ? `<div class="row"><label>납부 예정일</label><span class="val">${fmtDate(s.회차6납부예정일)} · ${monthText(회차6개월)}</span></div>` : ''}
      ${needRow(회차6월필요, 월목표)}
      <div class="gauge">
        <div class="gauge-header"><span>달성률</span><span>${회차6률.toFixed(1)}%</span></div>
        <div class="bar"><div class="fill ${fillCls(회차6률)}" style="width:${회차6률}%"></div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">마이너스통장 현황</div>
      <div class="row"><label>한도</label><span class="val">${fmt(마통한도)}</span></div>
      <div class="row"><label>출금 가능</label><span class="val green">${fmt(현재출금가능)}</span></div>
      <div class="row"><label>사용 중인 금액</label><span class="val red">${fmt(마통사용)}</span></div>
      <div class="row"><label>누적 입금</label><span class="val green">+${fmt(총입금)}</span></div>
      <div class="row"><label>누적 출금</label><span class="val red">-${fmt(총출금)}</span></div>
    </div>
  `;
}

/* ── 입출금 내역 ── */
function renderHistory() {
  const txs = [...(appData.transactions || [])];
  txs.sort((a, b) => (b.date || '').localeCompare(a.date || '') || (b.createdAt || 0) - (a.createdAt || 0));

  if (!txs.length) {
    document.getElementById('histContent').innerHTML =
      '<div style="text-align:center;padding:32px;color:#b8b2a8">내역이 없습니다.</div>';
    return;
  }

  const tagCls = { '입금': '입금', '출금': '출금', '중도금 납부': '중도금' };
  const sign   = { '입금': '+', '출금': '-', '중도금 납부': '' };

  let listHtml = '<div class="tx-list">';
  for (const tx of txs) {
    const tc = tagCls[tx.type] || '';
    listHtml += `
      <div class="tx-item">
        <span class="tx-tag ${tc}">${tx.type}</span>
        <div class="tx-info">
          <div class="tx-date">${fmtDate(tx.date)}</div>
          <div class="tx-memo">${tx.memo || '—'}</div>
        </div>
        <div class="tx-amount ${tc}">${sign[tx.type] || ''}${fmt(tx.amount)}</div>
        <div class="tx-btns">
          <button class="btn btn-gray btn-sm" onclick="startEdit('${tx.id}')">수정</button>
          <button class="btn btn-danger btn-sm" onclick="deleteTx('${tx.id}')">삭제</button>
        </div>
      </div>`;
  }
  listHtml += '</div>';

  const monthMap = {};
  for (const tx of txs) {
    const m = (tx.date || '').slice(0, 7);
    if (!m) continue;
    if (!monthMap[m]) monthMap[m] = { in: 0, out: 0 };
    if (tx.type === '입금')        monthMap[m].in  += tx.amount || 0;
    if (tx.type === '출금')        monthMap[m].out += tx.amount || 0;
    if (tx.type === '중도금 납부')  monthMap[m].out += tx.amount || 0;
  }

  let monthHtml = '<div class="month-section"><h3>월별 합계</h3>';
  for (const m of Object.keys(monthMap).sort().reverse()) {
    const [y, mo] = m.split('-');
    const d = monthMap[m];
    monthHtml += `
      <div class="month-row">
        <span class="m-date">${y}년 ${parseInt(mo)}월</span>
        <span class="m-in">+${fmt(d.in)}</span>
        <span class="m-out">-${fmt(d.out)}</span>
      </div>`;
  }
  monthHtml += '</div>';

  document.getElementById('histContent').innerHTML = listHtml + monthHtml;
}

/* ── 내역 CRUD ── */
async function submitTx() {
  const date   = document.getElementById('txDate').value;
  const type   = document.getElementById('txType').value;
  const amount = parseAmt('txAmount');
  const memo   = document.getElementById('txMemo').value.trim();

  if (!date)           { alert('날짜를 입력해 주세요.'); return; }
  if (!amount || amount <= 0) { alert('금액을 입력해 주세요.'); return; }

  let transactions = [...(appData.transactions || [])];

  if (editingId) {
    transactions = transactions.map(t =>
      t.id === editingId ? { ...t, date, type, amount, memo } : t
    );
    cancelEdit();
  } else {
    transactions.push({ id: uid(), date, type, amount, memo, createdAt: Date.now() });
    document.getElementById('txAmount').value = '';
    document.getElementById('txMemo').value   = '';
  }

  await saveToFirestore({ transactions });
}

function startEdit(id) {
  const tx = (appData.transactions || []).find(t => t.id === id);
  if (!tx) return;
  editingId = id;
  document.getElementById('txDate').value = tx.date || '';
  document.getElementById('txType').value = tx.type || '입금';
  setMoneyValue('txAmount', tx.amount);
  document.getElementById('txMemo').value = tx.memo || '';
  document.getElementById('editBanner').classList.add('show');
  document.getElementById('cancelEditBtn').style.display = 'inline-flex';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelEdit() {
  editingId = null;
  document.getElementById('editBanner').classList.remove('show');
  document.getElementById('cancelEditBtn').style.display = 'none';
  document.getElementById('txDate').value   = new Date().toISOString().slice(0, 10);
  document.getElementById('txAmount').value = '';
  document.getElementById('txMemo').value   = '';
}

async function deleteTx(id) {
  if (!confirm('이 내역을 삭제하시겠습니까?')) return;
  await saveToFirestore({ transactions: (appData.transactions || []).filter(t => t.id !== id) });
}

/* ── 설정 ── */
function renderSettingsForm() {
  const s = appData.settings || {};
  const numFields  = ['마통한도','초기출금가능금액','현재출금가능금액','회차5필요금액','회차6필요금액','월목표저축액'];
  const dateFields = ['회차5납부예정일','회차6납부예정일'];

  for (const f of numFields) setMoneyValue('s_' + f, s[f] || null);
  for (const f of dateFields) {
    const el = document.getElementById('s_' + f);
    if (el && s[f]) el.value = s[f];
  }

  const btn5 = document.getElementById('btn5Complete');
  btn5.textContent = s.회차5완료 ? '5회차 완료 취소' : '5회차 완료 처리';
  btn5.className   = s.회차5완료 ? 'btn btn-gray btn-full' : 'btn btn-success btn-full';
}

async function saveSettings() {
  const numFields  = ['마통한도','초기출금가능금액','현재출금가능금액','회차5필요금액','회차6필요금액','월목표저축액'];
  const dateFields = ['회차5납부예정일','회차6납부예정일'];

  const settings = { ...(appData.settings || {}) };
  for (const f of numFields) settings[f] = parseAmt('s_' + f);
  for (const f of dateFields) settings[f] = document.getElementById('s_' + f).value || '';

  await saveToFirestore({ settings });
  alert('설정이 저장되었습니다.');
}

async function toggle5Complete() {
  const s = appData.settings || {};
  if (s.회차5완료) {
    if (!confirm('5회차 완료를 취소하시겠습니까?')) return;
    await saveToFirestore({ settings: { ...s, 회차5완료: false, 회차5완료시모은금액: 0 } });
  } else {
    if (!confirm('5회차 중도금 납부를 완료 처리하시겠습니까?')) return;
    const txs    = appData.transactions || [];
    const 총입금 = txs.filter(t => t.type === '입금').reduce((a,t) => a + (t.amount||0), 0);
    const 총출금 = txs.filter(t => t.type === '출금').reduce((a,t) => a + (t.amount||0), 0);
    const 현재모은 = ((s.현재출금가능금액||0) - (s.초기출금가능금액||0)) + 총입금 - 총출금;
    await saveToFirestore({ settings: { ...s, 회차5완료: true, 회차5완료시모은금액: 현재모은 } });
  }
}
</script>
